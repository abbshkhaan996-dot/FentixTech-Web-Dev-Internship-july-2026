<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Instagram Screens</title>
<style>
  :root{
    --bg: #e9e3f2;
    --phone-black: #1b1b1f;
    --screen-bg: #ffffff;
    --text-dark: #262626;
    --text-mid: #8e8e8e;
    --text-light: #c7c7c7;
    --line: #efefef;
    --line-strong: #dcdcdc;
    --grad-1: #f6b352;
    --grad-2: #ef5da8;
    --grad-3: #c93bd1;
    --grad-4: #7b3fd6;
    --heart-red: #ed4956;
    --blue: #3897f0;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  body{
    min-height: 100vh;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
  }

  .stage{
    display: flex;
    flex-wrap: wrap;
    gap: 48px;
    align-items: center;
    justify-content: center;
  }

  svg.icn{ display:block; }

  /* ---------- Phone chrome ---------- */
  .phone{
    width: 250px;
    height: 570px;
    background: var(--phone-black);
    border-radius: 40px;
    padding: 10px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.18);
    position: relative;
    flex-shrink: 0;
  }

  .notch{
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 15px;
    background: var(--phone-black);
    border-bottom-left-radius: 16px;
    border-bottom-right-radius: 16px;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .notch .cam{ width:7px; height:7px; border-radius:50%; background:#33333a; }
  .notch .spk{ width:34px; height:5px; border-radius:4px; background:#33333a; }

  .screen{
    width: 100%;
    height: 100%;
    background: var(--screen-bg);
    border-radius: 30px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ---------- Status bar ---------- */
  .status-bar{
    height: 26px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dark);
  }
  .status-bar .icons{ display:flex; gap:5px; align-items:center; color: var(--text-dark); }

  /* ---------- Shared bottom nav ---------- */
  .bottom-nav{
    height: 40px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-around;
    border-top: 1px solid var(--line);
    padding: 0 8px;
  }
  .bottom-nav .icon{ color: var(--text-mid); position: relative; display:flex; }
  .bottom-nav .icon.active{ color: var(--text-dark); }
  .bottom-nav .icon.active svg{ stroke-width: 2.2; }
  .bottom-nav .icon .badge{
    position:absolute; top:-4px; right:-7px;
    display:flex; align-items:center; justify-content:center;
    min-width:12px; height:12px; padding:0 2px;
    border-radius:8px;
    background: var(--heart-red);
    color:#fff; font-size:7px; font-weight:700;
    border: 1.5px solid #fff;
  }
  .bottom-nav .avatar-dot{
    width: 18px; height: 18px;
    border-radius: 50%;
    background: linear-gradient(135deg,var(--grad-2),var(--grad-4));
    flex-shrink:0;
  }

  /* placeholder gradient blocks used across screens */
  .ph-bar{ background: var(--line-strong); border-radius: 3px; }
  .avatar-grad{
    border-radius:50%;
    background: linear-gradient(135deg, #f7a1c4, #e85fa0);
  }

  /* =========================================================
     SCREEN 1 PROFILE
     ========================================================= */
  .profile-screen .top-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 8px 14px 6px;
  }
  .profile-screen .top-row .name-bar{ width: 72px; height: 7px; }
  .profile-screen .top-row .menu-icon{ color: var(--text-dark); position:relative; }
  .profile-screen .top-row .menu-icon .dot{
    position:absolute; top:-3px; right:-3px;
    width:7px; height:5px; border-radius:50%;
    background: var(--heart-red); border:1.5px solid #fff;
  }

  .profile-screen .switcher-bar{
    margin: 4px 14px 10px;
    height: 6px;
    border-radius: 4px;
    background: var(--line);
  }

  .profile-screen .info-row{
    display:flex;
    align-items:flex-start;
    gap: 12px;
    padding: 0 14px 12px;
  }
  .profile-screen .avatar-wrap{ position:relative; flex-shrink:0; }
  .profile-screen .avatar-lg{
    width:65px; height:70px;
    display:flex; align-items:center; justify-content:center;
    color:#fff;
  }
  .profile-screen .plus-badge{
    position:absolute; bottom:-2px; right:-2px;
    width:17px; height:17px; border-radius:50%;
    background: var(--blue); border:2px solid #fff;
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:11px; font-weight:700; line-height:1;
  }
  .profile-screen .stats-row{
    flex:1;
    display:flex;
    justify-content:space-between;
    padding-top:10px;
  }
  .profile-screen .stat{ display:flex; flex-direction:column; align-items:center; gap:7px; }
  .profile-screen .stat .n{ height:8px; width:26px; }
  .profile-screen .stat .l{ height:6px; width:34px; }

  .profile-screen .bio-lines{
    display:flex; flex-direction:column; gap:6px;
    padding: 0 14px 14px;
  }
  .profile-screen .bio-lines .bar{ height:7px; width:65%; }
  .profile-screen .bio-lines .bar:nth-child(2){ width:42%; }

  .profile-screen .action-row{
    display:flex;
    gap:6px;
    padding: 0 14px 14px;
  }
  .profile-screen .action-btn{
    flex:1;
    height: 24px;
    border-radius: 6px;
    border: 1px solid var(--line-strong);
    display:flex; align-items:center; justify-content:center;
  }
  .profile-screen .action-btn .bar{ height:6px; width:68%; background: var(--text-light); }

  .profile-screen .story-row{
    display:flex;
    align-items:flex-start;
    gap: 14px;
    padding: 2px 16px 1px;
  }
  .profile-screen .story-item{ display:flex; flex-direction:column; align-items:center; gap:6px; }
  .profile-screen .story-circle{
    width: 42px; height:42px;
    border-radius:50%;
    border: 1.5px dashed var(--text-light);
    display:flex; align-items:center; justify-content:center;
    color: var(--text-mid);
    flex-shrink:0;
  }
  .profile-screen .story-circle.filled{
    border-style: solid;
    border-color: transparent;
  }
  .profile-screen .story-circle.filled.s1{ background: linear-gradient(135deg,#f6b352,#ef5da8); }
  .profile-screen .story-circle.filled.s2{ background: linear-gradient(135deg,#ef5da8,#c93bd1); }
  .profile-screen .story-circle.filled.s3{ background: linear-gradient(135deg,#c93bd1,#7b3fd6); }
  .profile-screen .story-item .lbl{ height:5px; width:30px; }

  .profile-screen .tabs-row{
    display:flex;
    justify-content:space-around;
    align-items:center;
    border-top: 1px solid var(--line);
    padding: 10px 0;
    color: var(--text-mid);
  }
  .profile-screen .tabs-row .tab{
    padding-bottom: 9px;
    display:flex;
  }
  .profile-screen .tabs-row .tab.active{ color: var(--text-dark); border-bottom: 1.5px solid var(--text-dark); }

  .profile-screen .post-grid{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-auto-rows: 1fr;
    gap: 2px;
    padding: 2px;
    overflow: hidden;
    height: 170px;
  }
  .profile-screen .post-grid .cell{ min-height:0; }
  .g1{ background: linear-gradient(135deg,#f6b352,#ef5da8); }
  .g2{ background: linear-gradient(135deg,#ef5da8,#e35aa8); }
  .g3{ background: linear-gradient(135deg,#c93bd1,#7b3fd6); }
  .g4{ background: linear-gradient(135deg,#ef5da8,#c93bd1); }
  .g5{ background: linear-gradient(135deg,#e35aa8,#c93bd1); }
  .g6{ background: linear-gradient(135deg,#7b3fd6,#5a2fb0); }
  .g7{ background: linear-gradient(135deg,#f6b352,#e35aa8); }
  .g8{ background: linear-gradient(135deg,#c93bd1,#a23bd1); }
  .g9{ background: linear-gradient(135deg,#7b3fd6,#c93bd1); }
  .g10{ background: linear-gradient(135deg,#f18fbd,#d998e0); }
  .g11{ background: linear-gradient(135deg,#e35aa8,#9a4fce); }

  /* =========================================================
     SCREEN 2 FEED
     ========================================================= */
  .feed-screen .icon-row{
    display:flex;
    align-items:center;
    padding: 8px 14px 6px;
    color: var(--text-dark);
  }
  .feed-screen .icon-row .right-icons{ margin-left:auto; display:flex; gap:14px; }
  .feed-screen .icon-row .right-icons .ic{ position:relative; }
  .feed-screen .icon-row .right-icons .ic .dot{
    position:absolute; top:-3px; right:-3px;
    width:7px; height:7px; border-radius:50%;
    background: var(--heart-red); border:1.5px solid #fff;
  }

  .feed-screen .stories{
    display:flex; gap:12px;
    padding: 2px 14px 10px;
  }
  .feed-screen .story-item{ display:flex; flex-direction:column; align-items:center; gap:4px; flex-shrink:0; }
  .feed-screen .story-item .circle{
    width:30px; height:30px; border-radius:50%;
    position:relative;
  }
  .feed-screen .story-item .circle.mine{ background: linear-gradient(135deg,#f7a1c4,#e85fa0); }
  .feed-screen .story-item .circle.mine::after{
    content:"+";
    position:absolute; bottom:-2px; right:-2px;
    width:13px; height:13px; border-radius:50%;
    background: var(--blue); color:#fff;
    font-size:9px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
    border:1.5px solid #fff;
  }
  .feed-screen .story-item .circle.o1{ background: linear-gradient(135deg,#f6b352,#ef5da8); border:2px solid #fff; box-shadow:0 0 0 1.5px var(--grad-2); }
  .feed-screen .story-item .circle.o2{ background: linear-gradient(135deg,#ef5da8,#c93bd1); border:2px solid #fff; box-shadow:0 0 0 1.5px var(--grad-3); }
  .feed-screen .story-item .circle.o3{ background: linear-gradient(135deg,#c93bd1,#7b3fd6); border:2px solid #fff; box-shadow:0 0 0 1.5px var(--grad-4); }
  .feed-screen .story-item .circle.o4{ background: linear-gradient(135deg,#f18fbd,#d998e0); border:2px solid #fff; box-shadow:0 0 0 1.5px var(--grad-2); }
  .feed-screen .story-item .lbl{ height:5px; width:24px; }

  .feed-screen .caption-row{
    display:flex; align-items:center; gap:8px;
    padding: 6px 12px 8px;
  }
  .feed-screen .caption-row .mini-avatar{
    width:22px; height:22px; border-radius:50%; flex-shrink:0;
    background: linear-gradient(135deg,#f7a1c4,#e85fa0);
  }
  .feed-screen .caption-row .bar{ height:6px; width:50%; }
  .feed-screen .caption-row .dots{ margin-left:auto; color:var(--text-mid); }

  .feed-screen .post-media{
    margin: 0 2px;
    background: linear-gradient(160deg, var(--grad-1) 0%, var(--grad-2) 32%, var(--grad-3) 66%, var(--grad-4) 100%);
    height: 120px;
    flex-shrink: 0;
  }

  .feed-screen .action-icons{
    display:flex;
    align-items:center;
    padding: 10px 12px 6px;
    color: var(--text-dark);
  }
  .feed-screen .action-icons .left{ display:flex; gap:13px; align-items:center; }
  .feed-screen .action-icons .heart{ color: var(--heart-red); }
  .feed-screen .action-icons .save{ margin-left:auto; }

  .feed-screen .likes-row{ padding: 2px 12px 6px; }
  .feed-screen .likes-row .bar{ height:7px; width:34%; background: var(--text-mid); }

  .feed-screen .comment-line{
    display:flex; align-items:center; gap:8px;
    padding: 3px 12px;
  }
  .feed-screen .comment-line .mini-avatar{
    width:18px; height:18px; border-radius:50%; flex-shrink:0;
    background: linear-gradient(135deg,#f7a1c4,#e85fa0);
  }
  .feed-screen .comment-line .bar{ height:5px; width:55%; }
  .feed-screen .comment-line.text-only{ padding-left: 38px; }
  .feed-screen .comment-line.text-only .bar{ width:35%; }
  .feed-screen .comment-line .dots{ margin-left:auto; color:var(--text-mid); }

  .feed-screen .next-post-peek{
    margin-top: auto;
    height: 26px;
    background: linear-gradient(160deg, var(--grad-3), var(--grad-4));
  }

  /* =========================================================
     SCREEN 3 EXPLORE / GRID
     ========================================================= */
  .grid-screen .top-row{
    display:flex; align-items:center; gap:10px;
    padding: 8px 14px;
  }
  .grid-screen .search-box{
    flex:1;
    height: 30px;
    border-radius: 8px;
    background: var(--line);
    display:flex; align-items:center;
    padding: 0 10px;
    color: var(--text-mid);
    gap:8px;
  }
  .grid-screen .search-box .bar{ height:6px; width:40%; background: var(--text-light); }
  .grid-screen .top-row .cam-icon{ color: var(--text-dark); flex-shrink:0; }

  .grid-screen .explore-grid{
    flex:1;
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(5, 1fr);
    gap: 2px;
    padding: 2px;
    overflow:hidden;
  }
  .grid-screen .cell{ position:relative; }
  .grid-screen .c-small1{ grid-column: 1; grid-row: 1; }
  .grid-screen .c-small2{ grid-column: 1; grid-row: 2; }
  .grid-screen .c-big{ grid-column: 2 / 4; grid-row: 1 / 3; }
  .grid-screen .c-r3a{ grid-column: 1; grid-row: 3; }
  .grid-screen .c-r3b{ grid-column: 2; grid-row: 3; }
  .grid-screen .c-r3c{ grid-column: 3; grid-row: 3; }
  .grid-screen .c-r4a{ grid-column: 1; grid-row: 4; }
  .grid-screen .c-r4b{ grid-column: 2; grid-row: 4; }
  .grid-screen .c-r4c{ grid-column: 3; grid-row: 4; }
  .grid-screen .c-wide{ grid-column: 1 / 3; grid-row: 5; }
  .grid-screen .c-r5c{ grid-column: 3; grid-row: 5; }
  .grid-screen .cell .dot-mark{
    position:absolute; top:6px; right:6px;
    width:5px; height:5px; border-radius:50%;
    background:#fff; opacity:0.9;
  }

  /* ---------- caption under each phone ---------- */
  .phone-wrap{ display:flex; flex-direction:column; align-items:center; gap:14px; }
  .phone-label{
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dark);
    letter-spacing: 0.2px;
  }
</style>
</head>

  <!-- ============ SCREEN 2: FEED ============ -->
  <div class="phone-wrap">
    <div class="phone">
      <div class="notch"><span class="cam"></span><span class="spk"></span></div>
      <div class="screen feed-screen">
        <div class="status-bar">
          <span>9:41</span>
